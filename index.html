<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#FFFFFF">
<title>Mono — Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@500;700&family=Spline+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bk:#0A0A0A;
  --wh:#FFFFFF;
  --g1:#F4F4F4;
  --g2:#E2E2E2;
  --g3:#8A8A8A;
  --r:14px;
  --disp:"Familjen Grotesk",-apple-system,"Segoe UI",sans-serif;
  --body:"Spline Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  --mono:"Spline Sans Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{font-family:var(--body);color:var(--bk);background:var(--wh);line-height:1.5;
  min-height:100vh;min-height:100dvh}
.wrap{max-width:680px;margin:0 auto;padding:0 18px}
header{position:sticky;top:0;z-index:40;background:var(--wh);border-bottom:1.5px solid var(--bk);padding-top:env(safe-area-inset-top)}
.hbar{max-width:680px;margin:0 auto;padding:12px 18px}
.wordmark{font-family:var(--disp);font-weight:700;font-size:1.1rem;letter-spacing:.02em;display:flex;align-items:center;gap:8px}
.wordmark .blk{background:var(--bk);color:var(--wh);padding:1px 8px;border-radius:6px}
h1{font-family:var(--disp);font-weight:700;font-size:clamp(1.7rem,6.5vw,2.3rem);line-height:1.12;letter-spacing:-.01em;margin:22px 0 4px}
.sub{font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--g3);margin-bottom:22px}
main{padding-top:6px;padding-bottom:40px}
.stack{display:flex;flex-direction:column;gap:12px}
.card{display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:var(--wh);border:1.5px solid var(--bk);border-radius:var(--r);padding:18px;
  text-decoration:none;color:var(--bk)}
.card:active{background:var(--g1)}
.card h3{font-family:var(--disp);font-weight:700;font-size:1.05rem;margin-bottom:2px}
.card p{font-size:.82rem;color:var(--g3)}
.chev{font-family:var(--mono);font-size:1.1rem;color:var(--g3);flex:0 0 auto}
.addnote{font-family:var(--mono);font-size:.68rem;letter-spacing:.06em;color:var(--g3);text-align:center;margin-top:26px}
.btn{width:100%;border:1.5px solid var(--bk);background:var(--bk);color:var(--wh);border-radius:var(--r);
  padding:15px;font-family:var(--body);font-weight:600;font-size:.95rem;cursor:pointer}
.btn:active{opacity:.8}
.btn:disabled{opacity:.5}
.status{font-family:var(--mono);font-size:.7rem;letter-spacing:.04em;color:var(--g3);margin-top:4px}
</style>
</head>
<body>

<header>
  <div class="hbar">
    <div class="wordmark"><span class="blk">MONO</span> hub</div>
  </div>
</header>

<main class="wrap">
  <h1>Your tools</h1>
  <div class="sub">Tap one to open</div>

  <div class="stack">
    <a class="card" href="mono-budget-tracker.html">
      <div>
        <h3>Budget</h3>
        <p>Track spending, synced to your private repo</p>
      </div>
      <span class="chev">→</span>
    </a>
    <div class="status" id="status-Budget">&nbsp;</div>

    <a class="card" href="mono-mind-trainer.html">
      <div>
        <h3>Mind</h3>
        <p>Attention &amp; memory training</p>
      </div>
      <span class="chev">→</span>
    </a>
    <div class="status" id="status-Mind">&nbsp;</div>

    <!-- New tool? Add another card here, same shape, pointing at its .html file,
         plus a matching <div class="status" id="status-NAME"> line, and add it
         to the APPS list in the script below. -->
  </div>

  <button class="btn" id="syncAllBtn" style="margin-top:22px">Sync all now</button>

  <div class="addnote">ADD-TO-HOME-SCREEN FROM THIS PAGE FOR ONE HUB ICON</div>
</main>

<script>
const $=id=>document.getElementById(id);
const APPS=[
  {name:"Budget",key:"mono-budget-v1",path:"data/mono-budget.json"},
  {name:"Mind",key:"mono-mind-v1",path:"data/mono-mind.json"}
];
const b64e=s=>btoa(unescape(encodeURIComponent(s)));
const b64d=s=>decodeURIComponent(escape(atob(String(s).replace(/\s/g,""))));
const normRepo=v=>String(v||"").trim().replace(/^(https?:\/\/)?(www\.)?github\.com\//i,"").replace(/\.git$/i,"").replace(/\/+$/,"").split("/").slice(0,2).join("/");
function ghExplain(e){
  const m=String(e&&e.message||"");
  if(/401/.test(m))return"token rejected (401) — reconnect in the app";
  if(/403/.test(m))return"forbidden (403) — token needs contents: read & write";
  if(/404/.test(m))return"repo not found (404) — check owner/repo in the app";
  if(/409|422/.test(m))return"sync conflict — tap sync again";
  return"no connection to github";
}
async function syncApp(app){
  const raw=localStorage.getItem(app.key);
  if(!raw)return{name:app.name,status:"nothing on this device yet"};
  let S;try{S=JSON.parse(raw)}catch(e){return{name:app.name,status:"couldn't read local data"}}
  if(!S.gh||!S.gh.enabled||!S.gh.repo||!S.gh.token)return{name:app.name,status:"not connected — open the app once to connect"};
  const parts=normRepo(S.gh.repo).split("/");
  if(parts.length!==2)return{name:app.name,status:"bad repo setting — reconnect in the app"};
  const api="https://api.github.com/repos/"+parts[0]+"/"+parts[1]+"/contents/"+app.path;
  const hdr={"Authorization":"Bearer "+S.gh.token,"Accept":"application/vnd.github+json"};
  try{
    const r=await fetch(api,{headers:hdr});
    let sha=null,remote=null;
    if(r.status===404){/* no remote file yet — first push */}
    else if(!r.ok)throw new Error("GET "+r.status);
    else{const j=await r.json();sha=j.sha;remote=JSON.parse(b64d(j.content))}
    const localUpdated=(S.meta&&S.meta.updatedAt)||0;
    const remoteUpdated=(remote&&remote.meta&&remote.meta.updatedAt)||0;
    if(remote&&remoteUpdated>localUpdated){
      const gh=Object.assign({},S.gh,{lastSync:Date.now()});
      const merged=Object.assign({},remote,{gh});
      localStorage.setItem(app.key,JSON.stringify(merged));
      return{name:app.name,status:"pulled newer data from GitHub"};
    }
    const payload=JSON.parse(JSON.stringify(S));delete payload.gh;
    const body={message:"mono sync (hub) "+new Date().toISOString(),content:b64e(JSON.stringify(payload))};
    if(sha)body.sha=sha;
    const pr=await fetch(api,{method:"PUT",headers:Object.assign({"Content-Type":"application/json"},hdr),body:JSON.stringify(body)});
    if(!pr.ok)throw new Error("PUT "+pr.status);
    S.gh.lastSync=Date.now();
    localStorage.setItem(app.key,JSON.stringify(S));
    return{name:app.name,status:"synced "+new Date().toLocaleTimeString()};
  }catch(e){
    return{name:app.name,status:ghExplain(e)};
  }
}
$("syncAllBtn").addEventListener("click",async()=>{
  const btn=$("syncAllBtn");
  btn.disabled=true;btn.textContent="Syncing…";
  const results=await Promise.all(APPS.map(syncApp));
  results.forEach(r=>{const el=$("status-"+r.name);if(el)el.textContent=r.status});
  btn.disabled=false;btn.textContent="Sync all now";
});
</script>
</body>
</html>
